<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Leticia ❤️</title>

<style>
body{
    background:#ffe6ee;
    font-family:Arial, sans-serif;
    text-align:center;
    padding-top:100px;
    overflow:hidden;
}

h1{
    color:#d63384;
}

button{
    padding:15px 30px;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

#sim{
    background:#28a745;
    color:white;
}

#nao{
    background:#dc3545;
    color:white;
    position:absolute;
}
</style>
</head>
<body>

<h1>💍 Pedido Oficial de Casamento 💍</h1>

<p>
Depois de muitos momentos incríveis, cheguei à conclusão de que quero passar
o resto da minha vida ao seu lado.
</p>

<h2>Leticia, você aceita casar comigo? ❤️</h2>

<button id="sim">SIM</button>
<button id="nao">NÃO</button>

<script>
const nao = document.getElementById("nao");

nao.style.left = "60%";
nao.style.top = "60%";

nao.addEventListener("mouseover", () => {
    const largura = window.innerWidth - nao.offsetWidth;
    const altura = window.innerHeight - nao.offsetHeight;

    nao.style.left = Math.random()*largura + "px";
    nao.style.top = Math.random()*altura + "px";
});

document.getElementById("sim").onclick = () => {
    window.location.href = "termos.html";
};
</script>

</body>
</html>
